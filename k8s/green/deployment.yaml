apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceflow-green
  namespace: default
  labels:
    app: invoiceflow
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: invoiceflow
      slot: green
  template:
    metadata:
      labels:
        app: invoiceflow
        slot: green
    spec:
      containers:
        - name: api
          image: asia-south1-docker.pkg.dev/cat-2-491109/invoiceflow/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: GCP_PROJECT_ID
              value: "cat-2-491109"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5